<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frogmageddon</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="BlazorAsteroids.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app"></div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // Heartbeat to keep the server alive (for standalone exe mode)
        setInterval(function() {
            fetch('/api/heartbeat').catch(function() {});
        }, 5000);

        // Signal the server immediately when the tab/window closes
        window.addEventListener('beforeunload', function() {
            navigator.sendBeacon('/api/shutdown');
        });
    </script>
</body>

</html>
